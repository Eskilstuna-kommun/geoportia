        enum:
          - Godkänd
          - Utkast
          - Under granskning
      title:
        type: string
        title: Titel
      summary:
        type: string
        title: Sammanfattning
      securityClass:
        type: string
        title: Säkerhetsklass
        enum:
          - Öppen data
          - Begränsad åtkomst
          - Skyddad
      contactPerson:
        type: string
        title: Kontaktperson
      lastUpdated:
        type: string
        title: Senast uppdaterad
        format: date

  # The actual metadata values
  metadata:
    status: Godkänd
    title: Byggnader i Eskilstuna kommun
    summary: Detta lager innehåller alla byggnader inom Eskilstuna kommuns gränser. Data hämtas från fastighetskartan.
    securityClass: Öppen data
    contactPerson: Anders Andersson
    lastUpdated: '2026-04-10'
