apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-metadata-template
  title: GeoPortia Metadata Template
  description: A template that demonstrates the GeoPortiaMetadataField for collecting custom metadata
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Layer
      required:
        - layerInfo
      properties:
        layerInfo:
          title: Layer Information
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Layer Information
            geoportiaMetadataSchema:
              required:
                - status
                - layerName
                - title
                - summary
                - securityClass
              properties:
                status:
                  type: string
                  title: Status
                  enum:
                    - Approved
                    - Draft
                    - Under Review
                    - Rejected
                  default: Approved
                layerName:
                  type: string
                  title: Layer Name
                title:
                  type: string
                  title: Title
                summary:
                  type: string
                  title: Summary
                securityClass:
                  type: string
                  title: Security Class
                  enum:
                    - 'No protection required - available for public access'
                    - 'Limited protection required'
                    - 'High protection required'
                  default: 'No protection required - available for public access'
                openData:
                  type: boolean
                  title: Open Data
                  default: false
                contactPerson:
                  type: string
                  title: Contact Person
            geoportiaMetadataUiSchema:
              summary:
                'ui:widget': 'textarea'
                'ui:options':
                  rows: 4
    - title: Database
      required:
        - databaseInfo
        - attributes
      properties:
        databaseInfo:
          title: Database Information
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Database
            geoportiaMetadataSchema:
              required:
                - database
                - dataType
                - dataset
              properties:
                database:
                  type: string
                  title: Database
                dataType:
                  type: string
                  title: Data Type
                dataset:
                  type: string
                  title: Dataset
                allowAttachments:
                  type: boolean
                  title: Allow Attachments
                  default: false
        attributes:
          title: Attribute Specification
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Attribute Specifications
            geoportiaMetadataSchema:
              type: array
              items:
                type: object
                required:
                  - name
                  - alias
                  - securityClass
                  - dataFormat
                properties:
                  name:
                    type: string
                    title: Name
                  alias:
                    type: string
                    title: Alias (FTL Name)
                  description:
                    type: string
                    title: Description
                  dataFormat:
                    type: string
                    title: Data Format
                  length:
                    type: string
                    title: Length
                  securityClass:
                    type: string
                    title: Security Class
                    enum:
                      - 'No protection required'
                      - 'Limited protection required'
                      - 'High protection required'
                    default: 'No protection required'
                  domain:
                    type: string
                    title: Domain
                  allowEmptyValues:
                    type: boolean
                    title: Allow Empty Values
                    default: false
            geoportiaMetadataUiSchema:
              'ui:options':
                addButtonText: Create new attribute
                emptyMessage: No attributes yet. Click the button above to add one.
                tableColumns:
                  - name
                  - alias
                  - securityClass
                  - description
                  - domain
              items:
                description:
                  'ui:widget': 'textarea'
                  'ui:options':
                    rows: 3
    - title: Metadata
      required:
        - metadata
      properties:
        metadata:
          title: Metadata
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Metadata
            geoportiaMetadataSchema:
              required: 
                - administrationRoutine
                - maintenanceFrequency
                - subjectArea
                - originHistory
                - source
                - quality
                - dataCollectionMethod
                - processingMethod
                - boundingBoxType
                - datasetStatus
              properties:
                administrationRoutine:
                  type: string
                  title: Administration Routine
                  description: Description of how the dataset is administered, e.g. processes for updating, quality control and handling user feedback.
                maintenanceFrequency:
                  type: string
                  title: Maintenance Frequency
                subjectArea:
                  type: string
                  title: Subject Area
                originHistory:
                  type: string
                  title: Origin History
                source:
                  type: string
                  title: Source
                quality:
                  type: string
                  title: Quality
                dataCollectionMethod:
                  type: string
                  title: Data Collection Method
                processingMethod:
                  type: string
                  title: Processing Method
                boundingBoxType:
                  type: string
                  title: Bounding Box Type
                datasetStatus:
                  type: string
                  title: Dataset Status
  steps:
    - id: log
      name: Log values
      action: debug:log
      input:
        message: 'Metadata collected'

  output:
    links:
      - title: View in catalog
        icon: catalog
        entityRef: ${{ steps['log'].output.entityRef }}
