apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-metadata-template
  title: Ändra databasspecifikation
  description: En mall för att samla in och hantera metadata för GeoPortia-lager
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Lager
      required:
        - layerInfo
      properties:
        layerInfo:
          title: Lagerinformation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Lagerinformation
            geoportiaMetadataSchema:
              required:
                - status
                - layerName
                - title
                - summary
                - securityClass
              properties:
                status:
                  type: string
                  title: Status
                  enum:
                    - 'Välj...'
                    - Ska sättas
                    - Raderad
                    - Förslagen
                    - Godkänd
                    - Ska avpubliceras
                  default: 'Välj...'
                layerName:
                  type: string
                  title: Lagernamn
                title:
                  type: string
                  title: Titel
                  description: Publik title för kartlagret. Visas bland annat i Eskilstunakartan.
                suggestedTitle:
                  type: string
                  title: Föreslagen titel
                summary:
                  type: string
                  title: Sammanfattning
                  description: En kort sammanfattande text över innehållet i kartlagret.
                securityClass:
                  type: string
                  title: Skyddsklass
                  description: Ansvarsfördelning för informationsmängden i relation till systemförvalting på GIS-enheten.
                  enum:
                    - 'Välj...'
                    - 'Inget skyddsbehov - tillgänglig för allmän åtkomst Anm: Ingen eller försumbar skada uppstår vid allmän tillgång till resursen.'
                    - 'Begränsat skyddsbehov - tillgänglig för behörig Anm: Ringa skada uppstår vid obehörig tillgång till resursen.'
                    - 'Måttligt skyddsbehov - tillgänglig för behörig Anm: Icke obetydlig skada uppstår vid obehörig tillgång till resursen.'
                    - 'Högt skyddsbehov - tillgänglig för behörig Anm: Betydande skada uppstår vid obehörig tillgång till resursen.'
                    - 'Mycket högt skyddsbehov - tillgänglig för behörig Anm: Allvarlig skada uppstår vid obehörig tillgång'
                  default: 'Välj...'
                openData:
                  type: boolean
                  title: Öppen data
                  default: false
                  description: Data som vem som helst fritt får använda, återanvända och distribuera med som största motprestation att ange källa eller krav på att dela data på samma sätt.
                contactPerson:
                  type: array
                  title: Kontaktpersoner
                  items:
                    type: string
            geoportiaMetadataUiSchema:
              summary:
                'ui:widget': 'textarea'
                'ui:options':
                  rows: 4
              contactPerson:
                'ui:widget': UserSearchWidget
    - title: Databas
      required:
        - databaseInfo
        - attributes
      properties:
        databaseInfo:
          title: Databasinformation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Databas
            geoportiaMetadataSchema:
              required:
                - database
                - dataType
                - dataset
              properties:
                database:
                  type: string
                  title: Databas
                dataType:
                  type: string
                  title: Datatyp
                  enum:
                    - 'Välj...'
                    - 'Ej definierad'
                    - 'Linje'
                    - 'Multipatcher'
                    - 'Punkt'
                    - 'Polygon'
                    - 'Raster'
                    - 'Tabell'
                    - 'Text'
                  default: 'Välj...'
                dataset:
                  type: string
                  title: Dataset
                allowAttachments:
                  type: boolean
                  title: Tillåt bilagor
            geoportiaMetadataUiSchema:
              database:
                'ui:widget': TableSelectWidget
              dataset:
                'ui:widget': DatasetSelectWidget
        attributes:
          title: Attributspecifikation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Attributspecifikation
            geoportiaMetadataSchema:
              type: array
              items:
                type: object
                required:
                  - name
                  - alias
                  - securityClass
                  - dataFormat
                properties:
                  name:
                    type: string
                    title: Namn
                  alias:
                    type: string
                    title: Alias (FTL-namn)
                  description:
                    type: string
                    title: Beskrivning
                  dataFormat:
                    type: string
                    title: Dataformat
                  length:
                    type: string
                    title: Längd
                  securityClass:
                    type: string
                    title: Skyddsklass
                    enum:
                      - 'Välj...'
                      - 'Inget skyddsbehov'
                      - 'Begränsat skyddsbehov'
                      - 'Måttligt skyddsbehov'
                      - 'Högt skyddsbehov'
                      - 'Mycket högt skyddsbehov'
                    default: 'Välj...'
                  domain:
                    type: string
                    title: Domän
                  allowEmptyValues:
                    type: boolean
                    title: Tillåt tomma värden
                    default: false
            geoportiaMetadataUiSchema:
              'ui:options':
                addButtonText: Skapa nytt attribut
                emptyMessage: Inga attribut än. Klicka på knappen ovan för att lägga till ett.
                tableColumns:
                  - name
                  - alias
                  - securityClass
                  - description
                  - domain
              items:
                description:
                  'ui:widget': 'textarea'
                  'ui:options':
                    rows: 3
    - title: Metadata
      required:
        - metadata
      properties:
        metadata:
          title: Metadata
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Metadata
            geoportiaMetadataSchema:
              required: 
                - administrationRoutine
                - maintenanceFrequency
                - subjectArea
                - originHistory
              properties:
                administrationRoutine:
                  type: string
                  title: Administrationsrutin
                  description: Ansvarsfördelning för informationsmängden i relation till systemförvaltning på GIS-enheten.
                  enum:
                    - 'Välj...'
                    - 'Informationsägaren gör jobbet själv'
                    - 'Informationsägaren får stöd av kontaktperson på Projekt- och GIS-avdelningen som står för teknisk kvalitetssäkring'
                    - 'Informationsägaren ger hela uppdraget till Projekt- och GIS-avdelningen'
                    - 'Information om förvaltningsprocessen saknas'
                  default: 'Välj...'
                maintenanceFrequency:
                  type: string
                  title: Underhållsfrekvens
                  description: Hur ofta kartlagret ajourhålls.
                  enum:
                    - 'Välj...'
                    - 'Okänt - uppdateringsfrekvens är ej känd'
                    - 'Kontinuerlig - data uppdateras ofta och kontinuerligt'
                    - 'Dagligen - data uppdateras dagligen'
                    - 'Veckovis - data uppdateras veckovis'
                    - 'Var 14:e dag - data uppdateras varannan vecka'
                    - 'Månadsvis - data uppdateras varje månad'
                    - 'Kvartalsvis - data uppdateras kvartalsvis'
                    - 'Halvårsvis - data uppdateras halvårsvis'
                    - 'Årligen - data uppdateras årligen'
                    - 'Vid behov - data uppdateras vid behov'
                    - 'Oregelbundet - data uppdateras med oregelbundna intervall'
                    - 'Ej planerad - data uppdateras planerad uppdatering'
                  default: 'Välj...'
                subjectArea:
                  type: array
                  title: Ämnesområde
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      - 'Administrativa gränser - offentligt bestämda avgränsningar av ett område'
                      - 'Arealtäckande bilder och baskartor - arealtäckande bilder och topografiska kartor'
                      - 'Areella näringar - skötsel av djur eller odling av grödor'
                      - 'Atmosfär, klimatologi och meteorologi - processer och fenomen i atmosfären'
                      - 'Biologi och ekologi - flora och fauna i naturlig miljö'
                      - 'Byggnader och byggnadskonstruktioner - konstruktioner skapade av människohand'
                      - 'Ekonomi - ekonomiska aktiviteter, förhållanden och sysselsättning'
                      - 'Fastigheter och fysisk planering - fastighetsinformation och planinformation för framtida markanvändning'
                      - 'Försvar - militär infrastruktur och aktiviteter'
                      - 'Geovetenskap - geovetenskap'
                      - 'Hälsa hälsa, sjuk- och hälsovård - human ekologi och säkerhet'
                      - 'Höjddata - höjd över eller under havsytan'
                      - 'Kust och hav - havs- och kustområden och dess egenskaper'
                      - 'Miljö - miljöresurser, miljöskydd och bevarande'
                      - 'Positionering - positionsbestämmande information och tjänster'
                      - 'Samhälle och kultur - samhällsförhållanden och kultur'
                      - 'Sjöar och vattendrag - insjövatten, dräneringssystem och deras egenskaper'
                      - 'Tekniska försörjningssystem - energi-, vatten- och avloppssystem, och infrastruktur och tjänster för kommunikation'
                      - 'Transporter - infrastruktur och hjälpmedel för att transportera människor och gods'
                  default: []
                originHistory:
                  type: string
                  title: Tillkomsthistorik
                source:
                  type: string
                  title: Källa
                quality:
                  type: string
                  title: Kvalitet
                dataCollectionMethod:
                  type: string
                  title: Datainsamlingsmetod
                processingMethod:
                  type: string
                  title: Bearbetningsmetod
                boundingBoxType:
                  type: string
                  title: Boundingboxtyp
                  enum:
                    - 'Välj...'
                    - 'Ej definierad'
                    - 'Minimal'
                    - 'Malardalen'
                    - 'Sodermanland'
                    - 'Sverige'
                    - 'Eskilstuna'
                    - '4M'
                  default: 'Välj...'
                datasetStatus:
                  type: string
                  title: Status datamängd
                  enum:
                    - 'Välj...'
                    - 'Komplett. Uppdateras eller kompletteras inte längre.'
                    - 'Planerad men ej tillgänglig för närvarande.'
                    - 'Under utveckling men ej normal tillgänglig.'
                    - 'Uppdateras eller kompletteras kontinuerligt.'
                  default: 'Välj...'
            geoportiaMetadataUiSchema:
              subjectArea:
                'ui:widget': 'checkboxes'

  
  steps:
    - id: log
      name: Log values
      action: debug:log
      input:
        message: 'Metadata collected'

    - id: store-metadata
      name: Store Metadata
      action: geoportia:metadata:store
      input:
        entityRef: metadataentry:default/${{ parameters.layerInfo.metadata.layerName | lower | replace(" ", "-") }}-metadata
        schema:
          type: object
          properties:
            layerInfo: ${{ parameters.layerInfo.schema }}
            databaseInfo: ${{ parameters.databaseInfo.schema }}
            attributes: ${{ parameters.attributes.schema }}
            metadata: ${{ parameters.metadata.schema }}
        metadata:
          layerInfo: ${{ parameters.layerInfo.metadata }}
          databaseInfo: ${{ parameters.databaseInfo.metadata }}
          attributes: ${{ parameters.attributes.metadata }}
          metadata: ${{ parameters.metadata.metadata }}

  output:
    links:
      - title: View Metadata Entry
        icon: catalog
        entityRef: ${{ steps['store-metadata'].output.entityRef }}
