apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-metadata-template
  title: Ändra databasspecifikation
  description: En mall för att samla in och hantera metadata för GeoPortia-lager
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Lager
      required:
        - layerInfo
      properties:
        layerInfo:
          title: Lagerinformation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Lagerinformation
            geoportiaMetadataSchema:
              required:
                - status
                - layerName
                - title
                - summary
                - securityClass
              properties:
                status:
                  type: string
                  title: Status
                  enum:
                    - Godkänd
                    - Utkast
                    - Under granskning
                    - Avvisad
                  default: Godkänd
                layerName:
                  type: string
                  title: Lagernamn
                title:
                  type: string
                  title: Titel
                  description: Publik title för kartlagret. Visas bland annat i Eskilstunakartan.
                suggestedTitle:
                  type: string
                  title: Föreslagen titel
                summary:
                  type: string
                  title: Sammanfattning
                  description: En kort sammanfattande text över innehållet i kartlagret.
                securityClass:
                  type: string
                  title: Skyddsklass
                  description: Ansvarsfördelning för informationsmängden i relation till systemförvalting på GIS-enheten.
                  enum:
                    - 'Välj...'
                    - 'Inget skyddsbehov - tillgänglig för allmän åtkomst Anm: Ingen eller försumbar skada uppstår vid allmän tillgång till resursen.'
                    - 'Begränsat skyddsbehov - tillgänglig för behörig Anm: Ringa skada uppstår vid obehörig tillgång till resursen.'
                    - 'Måttligt skyddsbehov - tillgänglig för behörig Anm: Icke obetydlig skada uppstår vid obehörig tillgång till resursen.'
                    - 'Högt skyddsbehov - tillgänglig för behörig Anm: Betydande skada uppstår vid obehörig tillgång till resursen.'
                    - 'Mycket högt skyddsbehov - tillgänglig för behörig Anm: Allvarlig skada uppstår vid obehörig tillgång'
                  default: 'Välj...'
                openData:
                  type: boolean
                  title: Öppen data
                  default: false
                  description: Datat har en skyddsklass som inte godkänner att det publiceras som öppna data
                contactPerson:
                  type: string
                  title: Kontaktpersoner
                suggestedOwnerEnhet:
                  type: string
                  title: Enhet
                  enum:
                    - 'Välj...'
                    - 'GIS-enheten'
                    - 'Kartenheten'
                    - 'Annan'
                  default: 'Välj...'
            geoportiaMetadataUiSchema:
              summary:
                'ui:widget': 'textarea'
                'ui:options':
                  rows: 4
    - title: Databas
      required:
        - databaseInfo
        - attributes
      properties:
        databaseInfo:
          title: Databasinformation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Databas
            geoportiaMetadataSchema:
              required:
                - database
                - dataType
                - dataset
              properties:
                database:
                  type: string
                  title: Databas
                  enum:
                    - 'Välj...'
                  default: 'Välj...'
                dataType:
                  type: string
                  title: Datatyp
                  enum:
                    - 'Välj...'
                    - 'Ej definierad'
                    - 'Linje'
                    - 'Multipatcher'
                    - 'Punkt'
                    - 'Polygon'
                    - 'Raster'
                    - 'Tabell'
                    - 'Text'
                  default: 'Välj...'
                dataset:
                  type: string
                  title: Dataset
                  enum:
                    - 'Välj...'
                  default: 'Välj...'
                allowAttachments:
                  type: boolean
                  title: Tillåt bilagor
            geoportiaMetadataUiSchema: {}
        attributes:
          title: Attributspecifikation
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Attributspecifikation
            geoportiaMetadataSchema:
              type: array
              items:
                type: object
                required:
                  - name
                  - alias
                  - securityClass
                  - dataFormat
                properties:
                  name:
                    type: string
                    title: Namn
                  alias:
                    type: string
                    title: Alias (FTL-namn)
                  description:
                    type: string
                    title: Beskrivning
                  dataFormat:
                    type: string
                    title: Dataformat
                  length:
                    type: string
                    title: Längd
                  securityClass:
                    type: string
                    title: Skyddsklass
                    enum:
                      - 'Välj...'
                      - 'Inget skyddsbehov'
                      - 'Begränsat skyddsbehov'
                      - 'Måttligt skyddsbehov'
                      - 'Högt skyddsbehov'
                      - 'Mycket högt skyddsbehov'
                    default: 'Välj...'
                  domain:
                    type: string
                    title: Domän
                  allowEmptyValues:
                    type: boolean
                    title: Tillåt tomma värden
                    default: false
            geoportiaMetadataUiSchema:
              'ui:options':
                addButtonText: Skapa nytt attribut
                emptyMessage: Inga attribut än. Klicka på knappen ovan för att lägga till ett.
                tableColumns:
                  - name
                  - alias
                  - securityClass
                  - description
                  - domain
              items:
                description:
                  'ui:widget': 'textarea'
                  'ui:options':
                    rows: 3
    - title: Metadata
      required:
        - metadata
      properties:
        metadata:
          title: Metadata
          type: object
          ui:field: GeoPortiaMetadataField
          ui:options:
            headerTitle: Metadata
            geoportiaMetadataSchema:
              required: 
                - administrationRoutine
                - maintenanceFrequency
                - subjectArea
                - originHistory
                - source
                - quality
                - dataCollectionMethod
                - processingMethod
                - boundingBoxType
                - datasetStatus
              properties:
                administrationRoutine:
                  type: string
                  title: Administrationsrutin
                  description: Beskrivning av hur datasetet administreras, t.ex. processer för uppdatering, kvalitetskontroll och hantering av användarfeedback.
                  enum:
                    - 'Välj...'
                    - 'Informationsägaren gör jobbet själv'
                    - 'Informationsägaren får stöd av kontaktperson på Projekt- och GIS-avdelningen som står för teknisk kvalitetssäkring'
                    - 'Informationsägaren ger hela uppdraget till Projekt- och GIS-avdelningen'
                    - 'Information om förvaltningsprocessen saknas'
                  default: 'Välj...'
                maintenanceFrequency:
                  type: string
                  title: Underhållsfrekvens
                  enum:
                    - 'Välj...'
                    - 'ej definierad'
                    - 'Ej planerat - det saknas planerad uppdatering'
                    - 'Kontinuerligt'
                    - 'Dagligen'
                    - 'Veckovis'
                    - 'Månadsvis'
                    - 'Kvartalsvis'
                    - 'Årligen'
                    - 'Vid behov'
                  default: 'Välj...'
                subjectArea:
                  type: string
                  title: Ämnesområde
                  enum:
                    - 'Välj...'
                    - 'Befolkning'
                    - 'Boende'
                    - 'Ekonomi'
                    - 'Energi'
                    - 'Fritid'
                    - 'Hälsa'
                    - 'Infrastruktur'
                    - 'Klimat'
                    - 'Kultur'
                    - 'Miljö'
                    - 'Natur'
                    - 'Politik'
                    - 'Samhälle'
                    - 'Säkerhet'
                    - 'Trafik'
                    - 'Utbildning'
                  default: 'Välj...'
                originHistory:
                  type: string
                  title: Tillkomsthistorik
                source:
                  type: string
                  title: Källa
                quality:
                  type: string
                  title: Kvalitet
                dataCollectionMethod:
                  type: string
                  title: Datainsamlingsmetod
                processingMethod:
                  type: string
                  title: Bearbetningsmetod
                boundingBoxType:
                  type: string
                  title: Boundingboxtyp
                  enum:
                    - 'Välj...'
                    - 'Punkt'
                    - 'Rektangel'
                    - 'Polygon'
                  default: 'Välj...'
                datasetStatus:
                  type: string
                  title: Status datamängd
                  enum:
                    - 'Komplett. Uppdateras eller kompletteras inte längre.'
                    - 'Under utveckling'
                    - 'Pågående'
                  default: 'Komplett. Uppdateras eller kompletteras inte längre.'

  
  steps:
    - id: log
      name: Log values
      action: debug:log
      input:
        message: 'Metadata collected'

    - id: store-metadata
      name: Store Metadata
      action: geoportia:metadata:store
      input:
        entityRef: metadataentry:default/${{ parameters.layerInfo.metadata.layerName | lower | replace(" ", "-") }}-metadata
        schema: ${{ parameters.layerInfo.schema }}
        metadata:
          layerInfo: ${{ parameters.layerInfo.metadata }}
          databaseInfo: ${{ parameters.databaseInfo.metadata }}
          attributes: ${{ parameters.attributes.metadata }}
          metadata: ${{ parameters.metadata.metadata }}

  output:
    links:
      - title: View Metadata Entry
        icon: catalog
        entityRef: ${{ steps['store-metadata'].output.entityRef }}
