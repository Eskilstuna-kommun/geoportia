apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-layer-spec-template
  title: Skapa kartlagerspecifikation
  description: En mall för att skapa en kartlagerspecifikation i Geoportia
spec:
  owner: user:guest
  type: service

  parameters:
    - title: CommonInformation
      description: Allmän information
      properties:
        entityRef:
          title: Metadatapost
          type: string
          description: Välj den huvuddatamängd du vill basera kartlagerspecifikationen på
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: MetadataEntry
            defaultKind: MetadataEntry
        metadata:
          title: Föreslagen metadata
          type: object
          ui:field: GeoserverCommonInformationField
          ui:options:
            headerTitle: Föreslagen metadata
            headerDescription: Redigera fälten nedan för att skapa kartlagerspecifikationen
            showSidebar: true
            requireEntityRef: true
            geoserverMetadataSchema:
              required:
                - title
              properties:
                title:
                  type: string
                  title: Titel på kartlagret
        name:
          type: string
          title: Namn på kartlagret
        abstract:
          type: string
          title: Sammanfattning för kartlagret
        boundingboxtyp:
          type: string
          title: Typ av bounding box
          default: 'Välj...'
          enum:
            - 'Välj...'
            - 'Ej definierad'
            - 'Minimal'
            - 'Malardalen'
            - 'Sodermanland'
            - 'Sverige'
            - 'Eskilstuna'
            - '4M'
    - title: Security and Access
      description: Säkerhet och åtkomst
      required:
        - availability
        - protectionClass
      properties:
        availability:
          type: string
          title: Tillgänglighet
          default: 'Intern'
          enum:
            - 'Intern'
            - 'Extern'
        protectionClass:
          type: string
          title: Skyddsklass
          default: 'Välj...'
          enum:
            - 'Välj...'
            - 'ej definierad'
            - 'Inget skyddsbehov'
            - 'Begränsat skydddsbehov'
            - 'Måttligt skyddsbehov'
            - 'Högt skyddsbehov'
            - 'Mycket högt skyddsbehov'
    - title: Database
      description: Databas
      properties:
        name:
          type: string
          title: Namn
        whereClause:
          type: string
          title: WHERE-sats för vy i PostGIS
        updateMethod:
          type: string
          title: Uppdateringsrutin i PostGIS
          enum:
            - 'unknown'
            - 'daily'
            - 'weekly'
            - 'asNeeded'
            - 'monthly'
        attributeSpecification:
          type: array
          title: Attributspecifikation
          items:
            type: object
            properties:
              name:
                type: string
                title: Namn på attribut
              type:
                type: string
                title: Datatyp för attribut
    - title: Geoserver
      description: Geoserver
      required:
        - standardStyle
      properties:
        workspace:
          type: string
          title: Arbetsyta i GeoServer
        datastore:
          type: string
          title: Datastore i GeoServer
        cachingRoutine:
          type: string
          title: Cachinrutin
        standardStyle:
          type: string
          title: Standardstil
        additionalStyles:
          type: array
          title: Ytterligare stilar
          items:
            type: string
            title: Namn på ytterligare stil

    - title: Management
      description: Förvaltning
      properties:
        updateRoutine:
          type: string
          title: Uppdateringsrutin
        status:
          type: string
          title: Status
          default: 'Välj...'
          enum:
            - 'Välj...'
            - 'Ska sättas'
            - 'Raderad'
            - 'Förslag'
            - 'Godkänd'
            - 'Ska avpubliceras'
            - 'Godkänd - ej sökbar'

  steps:
    - id: create-geoserver-layer
      name: Skapa GeoServer-lager
      action: geoserver:create-layer
      input:
        name: '{{ parameters.CommonInformation.name }}'
        workspace: '{{ parameters.Geoserver.workspace }}'
        datastore: '{{ parameters.Geoserver.datastore }}'
        nativeName: '{{ parameters.CommonInformation.name }}'
        title: '{{ parameters.CommonInformation.metadata.layerInfo.title }}'
        srs: 'EPSG:3006'
        enabled: true
        abstract: '{{ parameters.CommonInformation.abstract }}'
        storeType: 'PostGIS'
        nativeBoundingBox: '{{ parameters.CommonInformation.boundingboxtyp }}'
    - id: create-postgis-view
      name: Skapa PostGIS-vy
      action: postgresql:create-view
      input:
        distributionName: '{{ parameters.CommonInformation.name }}'
        tableName: '{{ parameters.Database.name }}'
        whereClause: '{{ parameters.Database.whereClause }}'