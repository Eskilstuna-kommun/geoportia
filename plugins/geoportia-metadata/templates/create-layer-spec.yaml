apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-layer-spec-template
  title: Skapa kartlagerspecifikation
  description: En mall för att skapa en kartlagerspecifikation i Geoportia
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Lager
      description: Lagerinformation
      required:
        - status
        - availability
        - databasspecifikation
        - name
        - titel
      properties:
        status:
          type: string
          title: Status för lagerinformation
        availability:
          type: string
          title: Tillgänglighet för lagerinformation
          enum:
            - 'Intern'
            - 'Extern'
        databasspecifikation:
          type: string
          title: Databasspecifikation för lagerinformation
        name:
          type: string
          title: Namn på lager
        titel:
          type: string
          title: Titel Eskilstunakartan
    - title: Kartlager
      description: Kartlager
      required:
        - orderer
        - style
      properties:
        orderer:
          type: string
          title: Beställare av kartlager
        style:
          type: string
          title: Kartlagerstil Standard
    - title: Metadata
      description: Fyll i metadata för kartlager
      required:
        - tillkomsthistorik
      properties:
        workspace:
          type: string
          title: Arbetsyta för kartlager
        cachingrutin:
          type: string
          title: Cachingrutin för kartlager
        tillkomsthistorik:
          type: string
          title: Tillkomsthistorik för kartlager
        boundingboxtyp:
          type: string
          title: Boundingboxtyp för kartlager
        status:
          type: string
          title: Status datamängd
    - title: Sökvy
      description: Fyll i detaljerna för sökvy
      properties:
        metaData:
          type: string
          title: Metadata för sökvy
        attributeSpecification:
            type: string
            title: Attribute specification för sökvy
  steps:
    - id: create-layer-spec
      name: Skapa kartlagerspecifikation
      action: geoportia:create-layer-spec
      input:
        status: '{{ parameters.Lager.status }}'
        availability: '{{ parameters.Lager.availability }}'
        databasspecifikation: '{{ parameters.Lager.databasspecifikation }}'
        name: '{{ parameters.Lager.name }}'
        titel: '{{ parameters.Lager.titel }}'
        orderer: '{{ parameters.Kartlager.orderer }}'
        style: '{{ parameters.Kartlager.style }}'
        workspace: '{{ parameters.Metadata.workspace }}'
        cachingrutin: '{{ parameters.Metadata.cachingrutin }}'
        tillkomsthistorik: '{{ parameters.Metadata.tillkomsthistorik }}'
        boundingboxtyp: '{{ parameters.Metadata.boundingboxtyp }}'
        statusdatamängd: '{{ parameters.Metadata.status }}'