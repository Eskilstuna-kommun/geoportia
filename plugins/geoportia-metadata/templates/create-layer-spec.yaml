apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: geoportia-layer-spec-template
  title: Skapa kartlagerspecifikation
  description: En mall för att skapa en kartlagerspecifikation i Geoportia
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Lager
      description: Lagerinformation
      required:
        - status
        - availability
        - databasspecifikation
        - name
        - titel
      properties:
        status:
          type: string
          title: Status för lagerinformation
        availability:
          type: string
          title: Tillgänglighet för lagerinformation
          enum:
            - 'Intern'
            - 'Extern'
        databasspecifikation:
          type: string
          title: Databasspecifikation för lagerinformation
        name:
          type: string
          title: Namn på lager
        titel:
          type: string
          title: Titel Eskilstunakartan
    - title: Kartlager
      description: Kartlager
      required:
        - orderer
        - style
      properties:
        orderer:
          type: string
          title: Beställare av kartlager
        style:
          type: string
          title: Kartlagerstil Standard
    - title: Metadata
      description: Fyll i metadata för kartlager
      required:
        - tillkomsthistorik
      properties:
        workspace:
          type: string
          title: Arbetsyta för kartlager
        cachingrutin:
          type: string
          title: Cachingrutin för kartlager
        tillkomsthistorik:
          type: string
          title: Tillkomsthistorik för kartlager
        boundingboxtyp:
          type: string
          title: Boundingboxtyp för kartlager
        status:
          type: string
          title: Status datamängd
    - title: Sökvy
      description: Fyll i detaljerna för sökvy
      properties:
        metaData:
          type: string
          title: Metadata för sökvy
        attributeSpecification:
            type: string
            title: Attribute specification för sökvy
  steps:
    - id: create-metadata
      name: Skapa metadata
      action: geoportia:metadata:store
      input:
        entityRef: '{{ parameters.Lager.name }}'
        metadata: '{{ parameters.Metadata }}'
        schema: '{{ parameters.Metadata.workspace }}'
    - id: create-postgresql-view
      name: Skapa PostGIS-sökvy
      action: postgresql:create-view
      input:
        viewName: '{{ parameters.Lager.name }}'
        schemaName: '{{ parameters.Metadata.workspace }}'
        tables: []
    - id: create-geoserver-layer
      name: Skapa GeoServer-lager
      action: geoserver:create-layer
      input:
        name: '{{ parameters.Lager.name }}'
        workspace: '{{ parameters.Metadata.workspace }}'
        datastore: '{{ parameters.Lager.databasspecifikation }}'
        nativeName: '{{ parameters.Lager.name }}'
        title: '{{ parameters.Lager.titel }}'
        srs: 'EPSG:3006'
        enabled: true
        abstract: 'Kartlager skapat via Backstage'
        storeType: 'PostGIS'
        nativeBoundingBox: '{{ parameters.Metadata.boundingboxtyp }}'