openapi: "3.0.0"
info:
  version: "1"
  title: geoportia-metadata
  description: ""
paths:
  /:
    post:
      operationId: "CreateMetadataEntry"
      description: "Create a new dataset metadata entry. The entityRef identifies the catalog entity (e.g. a Table) that the metadata describes."
      security:
        - {}
        - JWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataEntryCreate"
      responses:
        201:
          description: "Metadata entry created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataEntry"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /{entityRef}:
    put:
      operationId: "UpdateMetadataEntry"
      description: "Update an existing dataset metadata entry identified by entityRef (URL-encoded)."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef, e.g. encodeURIComponent('table:default/public.my_table')"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataEntryUpdate"
      responses:
        200:
          description: "Metadata entry updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataEntry"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      operationId: "DeleteMetadataEntry"
      description: "Delete a dataset metadata entry (and all versions) identified by entityRef (URL-encoded)."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef"
      responses:
        204:
          description: "Metadata entry deleted"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /suggestions:
    get:
      operationId: "ListAllSuggestions"
      description: "Get all metadata change suggestions across entries. Admin/Moderator users receive all suggestions; other users only see suggestions for entries where they are listed as contact person or data owner."
      security:
        - {}
        - JWT: []
      responses:
        200:
          description: "List of suggestions visible to the current user"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetadataSuggestion"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /{entityRef}/suggestions:
    get:
      operationId: "GetSuggestions"
      description: "Get all suggestions for a metadata entry identified by entityRef."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef"
      responses:
        200:
          description: "List of suggestions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetadataSuggestion"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /{entityRef}/suggestions/{id}/accept:
    post:
      operationId: "AcceptSuggestion"
      description: "Accept a suggestion and update the metadata entry."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef"
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "integer"
          description: "Suggestion ID"
      responses:
        200:
          description: "Suggestion accepted, metadata entry updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataEntry"
        default:
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: An error response from the backend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    MetadataEntry:
      type: object
      required: [entityRef, schema, metadata]
      additionalProperties: false
      properties:
        entityRef:
          type: string
          description: "Backstage string reference, e.g. table:default/public.my_table"
        schema:
          type: object
          description: "JSON schema used to build forms and validate/translate metadata"
          additionalProperties: true
        metadata:
          type: object
          description: "Metadata payload matching the schema"
          additionalProperties: true
    MetadataEntryCreate:
      allOf:
        - $ref: "#/components/schemas/MetadataEntry"
    MetadataEntryUpdate:
      type: object
      required: [schema, metadata]
      additionalProperties: false
      properties:
        schema:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    MetadataSuggestion:
      type: object
      required: [id, entityRef, metadata, createdAt, suggestedBy]
      additionalProperties: false
      properties:
        id:
          type: integer
          description: "Unique suggestion identifier"
        entityRef:
          type: string
          description: "Backstage string reference of the metadata entry"
        metadata:
          type: object
          description: "Suggested metadata payload"
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: "When the suggestion was created"
        suggestedBy:
          type: string
          description: "User who created the suggestion"
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            name:
              type: string
            message:
              type: string
          required:
            - name
            - message
        request:
          type: object
          properties:
            method:
              type: string
            url:
              type: string
          required:
            - method
            - url
        response:
          type: object
          properties:
            statusCode:
              type: number
          required:
            - statusCode
      required:
        - error
        - request
        - response

