openapi: "3.0.0"
info:
  version: "1"
  title: geoportia-metadata
  description: ""
paths:
  /:
    post:
      operationId: "CreateMetadataEntry"
      description: "Create a new dataset metadata entry. The entityRef identifies the catalog entity (e.g. a Table) that the metadata describes."
      security:
        - {}
        - JWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataEntryCreate"
      responses:
        201:
          description: "Metadata entry created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataEntry"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /{entityRef}:
    put:
      operationId: "UpdateMetadataEntry"
      description: "Update an existing dataset metadata entry identified by entityRef (URL-encoded)."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef, e.g. encodeURIComponent('table:default/public.my_table')"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetadataEntryUpdate"
      responses:
        200:
          description: "Metadata entry updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataEntry"
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      operationId: "DeleteMetadataEntry"
      description: "Delete a dataset metadata entry (and all versions) identified by entityRef (URL-encoded)."
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "entityRef"
          required: true
          schema:
            type: "string"
          description: "URL-encoded Backstage entityRef"
      responses:
        204:
          description: "Metadata entry deleted"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /data/{database}/{table}/preview:
    get:
      operationId: "GetTablePreview"
      description: ""
      security:
          - {}
          - JWT: []
      parameters:
        - in: "path"
          name: "database"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "table"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
  /databasspecifikation/{database}/{table}:
    get:
      operationId: "GetTableDescription"
      description: ""
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "database"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "table"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtendedTableResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: "CreateTableDescription"
      description: ""
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "database"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "table"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableCreate"
      responses:
        200:
          description: "New version of existing table description created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableResponse"
        201:
          description: "New table description created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'

  /databasspecifikation/{database}/{table}/{version}:
    get:
      operationId: "GetTableDescriptionAtVersion"
      description: ""
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "database"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "table"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "version"
          required: true
          schema:
            type: "integer"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
  /databasspecifikation/{database}/{table}/{version}/activate:
    post:
      operationId: "ActivateTableDescriptionVersion"
      description: ""
      security:
        - {}
        - JWT: []
      parameters:
        - in: "path"
          name: "database"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "table"
          required: true
          schema:
            type: "string"
        - in: "path"
          name: "version"
          required: true
          schema:
            type: "integer"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtendedTableResponse"
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: An error response from the backend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    MetadataEntry:
      type: object
      required: [entityRef, schema, metadata]
      additionalProperties: false
      properties:
        entityRef:
          type: string
          description: "Backstage string reference, e.g. table:default/public.my_table"
        schema:
          type: object
          description: "JSON schema used to build forms and validate/translate metadata"
          additionalProperties: true
        metadata:
          type: object
          description: "Metadata payload matching the schema"
          additionalProperties: true
    MetadataEntryCreate:
      allOf:
        - $ref: "#/components/schemas/MetadataEntry"
    MetadataEntryUpdate:
      type: object
      required: [schema, metadata]
      additionalProperties: false
      properties:
        schema:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            name:
              type: string
            message:
              type: string
          required:
            - name
            - message
        request:
          type: object
          properties:
            method:
              type: string
            url:
              type: string
          required:
            - method
            - url
        response:
          type: object
          properties:
            statusCode:
              type: number
          required:
            - statusCode
      required:
        - error
        - request
        - response
    ExtendedTableResponse:
      allOf:
        - $ref: "#/components/schemas/TableResponse"
        - type: object
          required: [versions]
          properties:
            versions:
              type: array
              items:
                type: object
                required: [version, active]
                properties:
                  version:
                    type: integer
                  active:
                    type: boolean
    TableResponse:
      type: object
      required: [database, name, version, active, title, owner, properties, attributes]
      additionalProperties: false
      properties:
        database:
          nullable: false
          type: "string"
        name:
          nullable: false
          type: "string"
        version:
          nullable: false
          type: "integer"
        active:
          nullable: false
          type: "boolean"
        title:
          nullable: false
          type: "string"
        owner:
          nullable: false
          type: "string"
        properties:
          nullable: false
          type: "object"
          additionalProperties:
            anyOf:
              - type: "string"
              - type: "number"
              - type: "boolean"
        attributes:
          nullable: false
          type: "array"
          items:
            $ref: "#/components/schemas/Attribute"
    Attribute:
      type: object
      required: [name, title, type, properties]
      additionalProperties: false
      properties:
        name:
          nullable: false
          type: "string"
        title:
          nullable: false
          type: "string"
        type:
          nullable: false
          type: "string"
          enum: ["string", "number", "boolean", "date", "datetime"]
        properties:
          nullable: false
          type: "object"
          additionalProperties:
            anyOf:
              - type: "string"
              - type: "number"
              - type: "boolean"
    TableCreate:
      type: object
      required: [title, owner, properties, attributes]
      additionalProperties: false
      properties:
        title:
          nullable: false
          type: "string"
        owner:
          nullable: false
          type: "string"
        properties:
          nullable: false
          type: "object"
          additionalProperties:
            anyOf:
              - type: "string"
              - type: "number"
              - type: "boolean"
        attributes:
          nullable: false
          type: "array"
          items:
            $ref: "#/components/schemas/Attribute"
    PreviewResponse:
      type: object
      additionalProperties: false
      required: [columns, head, values]
      properties:
        rows:
          type: "number"
        columns:
          nullable: false
          type: "array"
          items:
              type: "string"
        head:
          nullable: false
          type: "array"
          items:
            type: "array"
            items:
              anyOf:
                - type: "string"
                  nullable: true
                - type: "number"
                - type: "boolean"
        values:
          nullable: false
          type: "array"
          items:
            type: object
            required: [nulls]
            properties:
              nulls:
                type: "number"
                nullable: false
              countUnique:
                type: "number"
                nullable: false
              unique:
                type: "array"
                nullable: false
                items:
                  type: object
                  required: [count, value]
                  properties:
                    count:
                      nullable: false
                      type: "number"
                    value:
                      anyOf:
                        - type: "string"
                        - type: "number"
                        - type: "boolean"
